spring.application.name=tablecure
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://MySQL.railway.internal:3306/railway
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

razorpay.key=${RAZORPAY_KEY}
razorpay.secret=${RAZORPAY_SECRET}

jwt.secret=${JWT_SECRET}

# Email (Brevo transactional API — works on Railway, no SMTP port needed)
brevo.api-key=${BREVO_API_KEY}
mail.from=${MAIL_FROM:schinj98@gmail.com}
app.frontend-url=${APP_FRONTEND_URL:https://tablecure.vercel.app}
app.api-base-url=${APP_API_BASE_URL:https://api.tablecure.com}

# Cloudflare Cache Purge API
cloudflare.zone-id=${CLOUDFLARE_ZONE_ID}
cloudflare.api-token=${CLOUDFLARE_API_TOKEN}
3a7c26080cf39401e950a6a5c23aa987
# Cloudflare R2 (image storage)
r2.account-id=${R2_ACCOUNT_ID}
r2.access-key-id=${R2_ACCESS_KEY_ID}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY}
r2.bucket-name=${R2_BUCKET_NAME}
r2.public-url=${R2_PUBLIC_URL}

# Multipart upload limits (100 MB to support video uploads)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Caffeine in-memory cache (no Redis infra needed for single instance)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# Batch lazy loading — prevents N+1 without Cartesian product JOIN explosion
spring.jpa.properties.hibernate.default_batch_fetch_size=20